# Sensitive file path threat patterns for Sage
# Author: Gen Digital Inc.
# License: DRL-1.1 (see threats/LICENSE)
# Detects Read/Write/Edit/Delete operations targeting security-sensitive files

# --- System auth files ---
- id: "CLT-FILE-001"
  category: secrets
  severity: critical
  confidence: 0.95
  action: block
  pattern: "(/etc/passwd|/etc/shadow|/etc/sudoers)"
  match_on: file_path
  title: "Access system authentication file"
  expires_at: null
  revoked: false

# --- SSH authorized_keys ---
- id: "CLT-FILE-002"
  category: secrets
  severity: critical
  confidence: 0.95
  action: block
  pattern: "\\.ssh/authorized_keys"
  match_on: file_path
  title: "Access SSH authorized_keys (unauthorized access persistence)"
  expires_at: null
  revoked: false

# --- SSH private keys and config ---
- id: "CLT-FILE-003"
  category: secrets
  severity: high
  confidence: 0.90
  action: require_approval
  pattern: "\\.ssh/(id_rsa|id_ed25519|id_ecdsa|id_dsa|config)$"
  match_on: file_path
  title: "Access SSH key or config file"
  expires_at: null
  revoked: false

# --- Shell RC files ---
- id: "CLT-FILE-004"
  category: tool
  severity: high
  confidence: 0.85
  action: require_approval
  pattern: "\\.(bashrc|zshrc|profile|bash_profile|zprofile|zshenv)$"
  match_on: file_path
  title: "Access shell RC file (persistence mechanism)"
  expires_at: null
  revoked: false

# --- Cron directories ---
- id: "CLT-FILE-006"
  category: tool
  severity: high
  confidence: 0.85
  action: require_approval
  pattern: "(/etc/cron\\.(d|daily|hourly|weekly|monthly)/|/var/spool/cron/)"
  match_on: file_path
  title: "Access cron directory"
  expires_at: null
  revoked: false

# --- systemd unit files ---
- id: "CLT-FILE-007"
  category: tool
  severity: high
  confidence: 0.85
  action: require_approval
  pattern: "/etc/systemd/system/"
  match_on: file_path
  title: "Access systemd service unit file"
  expires_at: null
  revoked: false

# --- Credential/env files ---
# NOTE: Uses allowlist approach (explicit suffix enumeration) unlike CLT-CRED-003's
# denylist approach (negative lookahead). This means unknown suffixes like .env.ci
# match CRED-003 but not FILE-008 — intentional, since file_path matching is more
# targeted than command-string matching.
- id: "CLT-FILE-008"
  category: secrets
  severity: high
  confidence: 0.85
  action: require_approval
  pattern: "((^|[\\/\\\\])\\.env(\\.local|\\.production|\\.prod|\\.staging|\\.stage|\\.development|\\.dev|\\.test)?|\\.aws/credentials|\\.netrc|\\.pgpass)$"
  match_on: file_path
  title: "Access credential or environment file"
  expires_at: null
  revoked: false

# --- Git hooks ---
- id: "CLT-FILE-009"
  category: tool
  severity: high
  confidence: 0.85
  action: require_approval
  pattern: "\\.git/hooks/"
  match_on: file_path
  title: "Access git hook (potential code execution on git events)"
  expires_at: null
  revoked: false
